server:
  port: 8082

spring:
  application:
    name: payment-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payment_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: paymentResultEvent:br.com.fiap.techchallenge.paymentservice.application.dtos.PaymentResultEvent
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: >-
          orderCreatedEvent:br.com.fiap.techchallenge.paymentservice.application.dtos.OrderCreatedEvent,
          br.com.fiap.techchallenge.orderservice.application.dtos.OrderCreatedEvent:br.com.fiap.techchallenge.paymentservice.application.dtos.OrderCreatedEvent
        spring.json.value.default.type: br.com.fiap.techchallenge.paymentservice.application.dtos.OrderCreatedEvent

jwt:
  secret: ${JWT_SECRET:dGVjaC1jaGFsbGVuZ2UtZmFzZS0wMy1zZWNyZXQta2V5LWJhc2U2NC1lbmNvZGVk}

payment:
  external:
    url: ${PAYMENT_EXTERNAL_URL:http://localhost:8089/requisicao}
  retry:
    interval-ms: ${PAYMENT_RETRY_INTERVAL_MS:60000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
        cancelRunningFuture: true
    instances:
      externalPaymentProcessor:
        baseConfig: default

  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 20000ms
        failureRateThreshold: 50
    instances:
      externalPaymentProcessor:
        baseConfig: default

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1000ms
    instances:
      externalPaymentProcessor:
        baseConfig: default
